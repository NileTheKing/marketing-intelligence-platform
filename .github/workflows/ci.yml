name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Make Gradle wrappers executable
        run: |
          chmod +x core-service/gradlew
          chmod +x entry-service/gradlew

      - name: Test core-service
        working-directory: core-service
        run: ./gradlew test --no-daemon

      - name: Test entry-service
        working-directory: entry-service
        run: ./gradlew test --no-daemon

      - name: Validate Docker Compose config
        run: docker compose -f compose.app.yml config --quiet

      - name: Build application images
        run: docker compose -f compose.app.yml build core-service entry-service
