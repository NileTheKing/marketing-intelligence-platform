name: Deploy to Oracle VM Compose

on:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-compose-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            cd "${{ secrets.VM_APP_DIR }}"
            git pull origin main
            docker compose -f compose.app.yml config --quiet
            docker compose -f compose.app.yml up -d --build
            docker compose -f compose.app.yml restart axon-nginx

            wait_for_url() {
              name="$1"
              url="$2"
              for i in $(seq 1 30); do
                if curl -fsS "$url" > /dev/null; then
                  echo "$name is ready"
                  return 0
                fi
                echo "waiting for $name ($i/30)"
                sleep 2
              done
              echo "$name did not become ready: $url"
              return 1
            }

            wait_for_url "core-service" "http://127.0.0.1:8080/actuator/health"
            wait_for_url "entry-service" "http://127.0.0.1:8081/actuator/health"
            wait_for_url "axon-nginx" "http://127.0.0.1:28080/"
