name: Deploy to Oracle VM Compose

on:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-compose-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            cd "${{ secrets.VM_APP_DIR }}"
            git pull origin main
            docker compose -f compose.app.yml config --quiet
            docker compose -f compose.app.yml up -d --build
            curl -f http://127.0.0.1:8080/actuator/health
            curl -f http://127.0.0.1:8081/actuator/health
            curl -f -I http://127.0.0.1:28080/
