upstream entry_upstream {
    server entry-service:8081;
    keepalive 512;
}

upstream core_upstream {
    server core-service:8080;
    keepalive 256;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    location /actuator/ {
        return 404;
    }

    location /test/ {
        return 404;
    }

    location /entry/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://entry_upstream;
    }

    location /api/v1/payments/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://entry_upstream;
    }

    location /api/v1/test/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://entry_upstream;
    }

    location /api/v1/dashboard/stream/ {
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://core_upstream;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://core_upstream;
    }
}
