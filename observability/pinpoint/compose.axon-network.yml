# Use with the official pinpoint-docker docker-compose.yml.
#
# Example from the pinpoint-docker directory:
#   docker compose \
#     -f docker-compose.yml \
#     -f /home/ubuntu/apps/axon/observability/pinpoint/compose.axon-network.yml \
#     up -d
#
# This only connects the Pinpoint Collector to the Axon app network.
# Axon app containers send agent data to the collector; Web/Storage remain
# inside the Pinpoint stack.

services:
  pinpoint-collector:
    networks:
      pinpoint:
        ipv4_address: ${COLLECTOR_FIXED_IP:-172.24.0.30}
      axon_axon-network:
        aliases:
          - pinpoint-collector

networks:
  axon_axon-network:
    external: true
